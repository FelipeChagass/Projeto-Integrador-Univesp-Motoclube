<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cadastro - Bar Moto Clube</title>
    <link rel="icon" href="{{ url_for('static', filename='img/motorhead.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cadastro.css') }}">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>

    <!-- Toast -->
    <div id="cadastro-toast" class="cadastro-toast"></div>

    <!-- Loading -->
    <div id="cadastro-loading" class="cadastro-loading">
        <div class="spinner"></div>
    </div>

    <div class="cadastro-wrapper">
        <div class="cadastro-card">
            <img src="{{ url_for('static', filename='img/motorhead.png') }}" alt="Bar Moto Clube Logo" class="logo-img">
            <h1>CADASTRO</h1>
            <p class="subtitle">Crie sua conta de operador</p>

            <input type="text" id="cadastro-nome" class="cadastro-input" placeholder="Nome completo"
                autocomplete="name">
            <input type="email" id="cadastro-email" class="cadastro-input" placeholder="E-mail" autocomplete="email">
            <input type="password" id="cadastro-senha" class="cadastro-input" placeholder="Senha (mín. 4 caracteres)"
                autocomplete="new-password">

            <button class="btn-cadastro-primary" onclick="realizarCadastro()">CADASTRAR</button>
            <button class="btn-cadastro-secondary" onclick="window.location.href='/login'">VOLTAR AO LOGIN</button>

            <div class="cadastro-footer">
                <p>Já tem conta? <a href="/login">Faça login</a></p>
            </div>
        </div>
    </div>

    <script>
        function showToast(msg) {
            var t = document.getElementById('cadastro-toast');
            t.innerText = msg;
            t.className = 'cadastro-toast show';
            setTimeout(function () { t.className = 'cadastro-toast'; }, 3000);
        }

        function setLoading(show) {
            document.getElementById('cadastro-loading').className = show ? 'cadastro-loading active' : 'cadastro-loading';
        }

        // Se já está logado, redireciona para o POS
        API.getMe().then(function (res) {
            if (res.status === 'ok' && res.usuario) {
                window.location.href = '/pdv';
            }
        }).catch(function () { /* offline */ });

        // Enter no campo senha faz cadastro
        document.getElementById('cadastro-senha').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') realizarCadastro();
        });

        function realizarCadastro() {
            var nome = document.getElementById('cadastro-nome').value.trim();
            var email = document.getElementById('cadastro-email').value.trim();
            var senha = document.getElementById('cadastro-senha').value;

            if (!nome || !email || !senha) return showToast("Preencha todos os campos.");
            if (senha.length < 6) return showToast("Senha deve ter ao menos 6 caracteres.");

            setLoading(true);
            API.signup(email, senha, nome)
                .then(function (res) {
                    setLoading(false);
                    if (res.status === 'ok') {
                        window.location.href = '/pdv';
                    } else {
                        showToast(res.mensagem || "Erro no cadastro.");
                    }
                })
                .catch(function (err) {
                    setLoading(false);
                    showToast("Erro de conexão: " + (err.message || err));
                });
        }
    </script>
</body>

</html>
