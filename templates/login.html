<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Bar Moto Clube</title>
    <link rel="icon" href="{{ url_for('static', filename='img/motorhead.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <div id="login-toast" class="login-toast"></div>

    <div id="login-loading" class="login-loading">
        <div class="spinner"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <img src="{{ url_for('static', filename='img/motorhead.png') }}" alt="Bar Moto Clube Logo" class="logo-img">
            <h1>LOGIN</h1>
            <p class="subtitle">Entre com suas credenciais</p>

            <input type="email" id="login-email" class="login-input" placeholder="E-mail" autocomplete="email">

            <div class="senha-wrapper">
                <input type="password" id="login-senha" class="login-input" placeholder="Senha"
                    autocomplete="current-password">
                <button type="button" id="btn-toggle-senha" class="btn-toggle-senha" tabindex="-1" aria-label="Mostrar senha">

                    <i id="icon-olho-fechado" class="bi bi-eye-slash"></i>

                    <i id="icon-olho-aberto" class="bi bi-eye" style="display:none"></i>
                </button>
            </div>

            <div class="lembrar-wrapper">
                <label class="lembrar-label">
                    <input type="checkbox" id="lembrar-me">
                    <span>Lembrar-me neste dispositivo</span>
                </label>
            </div>

            <button class="btn-login-primary" id="btn-login" type="button">ENTRAR</button>

        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
