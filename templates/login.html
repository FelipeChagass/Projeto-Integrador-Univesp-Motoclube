<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Bar Moto Clube</title>
    <link rel="icon" href="{{ url_for('static', filename='img/motorhead.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>

    <!-- Toast -->
    <div id="login-toast" class="login-toast"></div>

    <!-- Loading -->
    <div id="login-loading" class="login-loading">
        <div class="spinner"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <img src="{{ url_for('static', filename='img/motorhead.png') }}" alt="Bar Moto Clube Logo" class="logo-img">
            <h1>LOGIN</h1>
            <p class="subtitle">Entre com suas credenciais</p>

            <input type="email" id="login-email" class="login-input" placeholder="E-mail" autocomplete="email">
            <input type="password" id="login-senha" class="login-input" placeholder="Senha"
                autocomplete="current-password">

            <button class="btn-login-primary" onclick="realizarLogin()">ENTRAR</button>
            <button class="btn-login-secondary" onclick="window.location.href='/cadastro'">CRIAR CONTA</button>


        </div>
    </div>

    <script>
        function showToast(msg) {
            var t = document.getElementById('login-toast');
            t.innerText = msg;
            t.className = 'login-toast show';
            setTimeout(function () { t.className = 'login-toast'; }, 3000);
        }

        function setLoading(show) {
            document.getElementById('login-loading').className = show ? 'login-loading active' : 'login-loading';
        }

        // Se já está logado, redireciona para o POS
        API.getMe().then(function (res) {
            if (res.status === 'ok' && res.usuario) {
                window.location.href = '/pdv';
            }
        }).catch(function () { });

        // Enter no campo senha faz login
        document.getElementById('login-senha').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') realizarLogin();
        });

        function realizarLogin() {
            var email = document.getElementById('login-email').value.trim();
            var senha = document.getElementById('login-senha').value;
            if (!email || !senha) return showToast("Preencha e-mail e senha.");

            setLoading(true);
            API.login(email, senha)
                .then(function (res) {
                    if (res.status === 'ok') {
                        // Login Supabase OK. Agora verifica se perfil existe no banco.
                        return API.getMe().then(function (meRes) {
                            if (meRes.status === 'pendente') {
                                // Perfil não existe ainda — sincroniza automaticamente
                                var nome = (res.usuario && res.usuario.user_metadata && res.usuario.user_metadata.nome) || email.split('@')[0];
                                return fetch(window.location.origin + '/api/auth/sincronizar', {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': 'Bearer ' + (res.usuario && res.usuario.access_token ? res.usuario.access_token : '')
                                    },
                                    body: JSON.stringify({ nome: nome, perfil: 'operador' })
                                }).then(function () {
                                    setLoading(false);
                                    window.location.href = '/pdv';
                                });
                            }
                            setLoading(false);
                            window.location.href = '/pdv';
                        });
                    } else {
                        setLoading(false);
                        showToast(res.mensagem || "Erro no login.");
                    }
                })
                .catch(function (err) {
                    setLoading(false);
                    showToast("Erro de conexão: " + (err.message || err));
                });
        }
    </script>
</body>

</html>
